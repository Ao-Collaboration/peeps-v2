name: Update Content

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for running the update'
        required: true
        default: 'Content update'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Notion script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: yarn script:notion

      - name: Run image download script
        run: yarn script:images

      - name: Run format
        run: yarn format

      - name: Build project
        run: yarn build

      - name: Show diff
        run: git diff

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Create and push changes
        run: |
          BRANCH="content-update-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "Update content from Notion and images"
          git push origin "$BRANCH"
          echo "BRANCH_NAME=$BRANCH" >> $GITHUB_ENV

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          title: 'Content Update'
          body: 'Automated content update from Notion and images'
          branch: ${{ env.BRANCH_NAME }}
          base: 'main'
          commit-message: 'Update content from Notion and images'
