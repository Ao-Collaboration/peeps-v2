name: Update Content

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for running the update'
        required: true
        default: 'Content update'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Notion script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: yarn script:notion

      - name: Run image download script
        run: yarn script:images

      - name: Run format
        run: yarn format

      - name: Build project
        run: yarn build

      - name: Show diff
        run: git diff

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          title: 'Content Update'
          body: 'Automated content update from Notion'
          branch: content-update
          branch-suffix: timestamp
          delete-branch: true
          base: 'main'
          commit-message: 'Update content from Notion'

      - name: Check outputs
        if: ${{ steps.create_pr.outputs.pull-request-number }}
        run: |
          echo "Pull Request Number - ${{ steps.create_pr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.create_pr.outputs.pull-request-url }}"
