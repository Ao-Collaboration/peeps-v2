name: Update Content

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for running the update'
        required: true
        default: 'Content update'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.5

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Notion Traits script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TRAITS_DATABASE_ID: ${{ secrets.NOTION_TRAITS_DATABASE_ID }}
        run: pnpm run script:traits

      - name: Run Notion Categories script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_CATEGORIES_DATABASE_ID: ${{ secrets.NOTION_CATEGORIES_DATABASE_ID }}
        run: pnpm run script:categories

      - name: Run image download script
        run: pnpm run script:images

      - name: Run format
        run: pnpm run format

      - name: Build project
        run: pnpm build

      - name: Show diff
        run: git diff

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          title: 'Content Update: ${{ github.event.inputs.reason }}'
          body: 'Automated content update: ${{ github.event.inputs.reason }}'
          branch: content-update
          branch-suffix: timestamp
          delete-branch: true
          base: 'main'
          commit-message: 'Update content: ${{ github.event.inputs.reason }}'
          assignees: ${{ github.actor }}

      - name: Check outputs
        if: ${{ steps.create_pr.outputs.pull-request-number }}
        run: |
          echo "Pull Request Number - ${{ steps.create_pr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.create_pr.outputs.pull-request-url }}"
