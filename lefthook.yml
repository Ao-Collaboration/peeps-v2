pre-commit:
  parallel: false
  commands:
    1_formatting:
      glob: "*.{js,jsx,ts,tsx,json,css,scss,md}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
    2_linting:
      glob: "*.{js,jsx,ts,tsx}"
      run: pnpm eslint {staged_files}
    3_build:
      run: pnpm build
    4_test:
      run: pnpm test:run
