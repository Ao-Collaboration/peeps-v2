pre-commit:
  parallel: false
  commands:
    0_stash_push:
      run: git stash push --keep-index --include-untracked
    1_formatting:
      glob: "*.{js,jsx,ts,tsx,json,css,scss,md}"
      run: pnpm prettier --write {staged_files} && git add {staged_files}
    2_linting:
      glob: "*.{js,jsx,ts,tsx}"
      run: pnpm eslint {staged_files}
    3_build:
      run: pnpm build
    9_stash_pop:
      run: git stash pop
